<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flowershop CRM</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
      (function() {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          var newPath = l.pathname + decoded + l.hash;
          sessionStorage.redirect = newPath;
          window.history.replaceState(null, null, newPath);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;">
        <p style="color:#ff4e00;font-size:18px;">Loading Flowershop CRM...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
